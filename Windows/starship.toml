format = """
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character"""

[username]
disabled = true

[hostname]
ssh_only = true
style = "green bold"
format = "[$user@$hostname]($style) "

[directory]
style = "cyan bold"
format = "[$path]($style) "
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"

[directory.substitutions]
"~" = "C:\\Users\\cloud"

[git_branch]
symbol = " "
style = "purple bold"
format = "[$symbol$branch]($style)"

[git_status]
style = "red bold"
format = '([$all_status$ahead_behind]($style)) '
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
style = "yellow bold"
format = "[⏱ $duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"