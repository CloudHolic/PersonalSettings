format = """
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$character"""

[username]
disabled = true

[hostname]
ssh_only = true
style = "#a6da95 bold"
format = "[$user@$hostname]($style) "

[directory]
style = "#8bd5ca bold"
format = "[$path]($style) "
truncation_length = 0
truncate_to_repo = false
home_symbol = "~"

[directory.substitutions]
"~" = "C:\\Users\\cloud"

[git_branch]
symbol = " "
style = "#c6a0f6 bold"
format = "[$symbol$branch]($style)"

[git_status]
style = "#ed8796 bold"
format = '([$all_status$ahead_behind]($style)) '
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 2000
style = "#eed49f bold"
format = "[⏱ $duration]($style) "

[character]
success_symbol = "[❯](#a6da95 bold)"
error_symbol = "[❯](#ed8796 bold)"